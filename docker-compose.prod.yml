services:
  app:
    build:
      context: .
      target: app
    image: questmaster:latest
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health/" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "8000:8000"
    environment:
      - FLASK_AUTH_SECRET=${FLASK_AUTH_SECRET}
      - FLASK_APP=${FLASK_APP}
      - SITE_BASE_URL=${SITE_BASE_URL}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_REDIRECT_URI=${DISCORD_REDIRECT_URI}
      - DISCORD_GUILD_NAME=${DISCORD_GUILD_NAME}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - DISCORD_GM_ROLE_ID=${DISCORD_GM_ROLE_ID}
      - DISCORD_ADMIN_ROLE_ID=${DISCORD_ADMIN_ROLE_ID}
      - DISCORD_PLAYER_ROLE_ID=${DISCORD_PLAYER_ROLE_ID}
      - POSTS_CHANNEL_ID=${POSTS_CHANNEL_ID}
      - ADMIN_CHANNEL_ID=${ADMIN_CHANNEL_ID}
      - UNITTEST_CHANNEL_ID=${UNITTEST_CHANNEL_ID}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    links:
      - db
      - redis

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD
        - sh
        - -c
        - |
          pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" &&
          psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c 'SELECT 1;'
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.6-alpine
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  db_data:
